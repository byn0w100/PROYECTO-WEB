<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Linux – Programación & Ciberseguridad</title>
  <style>
    :root {
      --bg: #0d1117;
      --bg2: #161b22;
      --bg3: #21262d;
      --border: #30363d;
      --border2: #484f58;
      --green: #3fb950;
      --green2: #26a641;
      --green3: #0d4429;
      --teal: #39d353;
      --cyan: #58a6ff;
      --yellow: #e3b341;
      --orange: #f0883e;
      --red: #f85149;
      --purple: #d2a8ff;
      --pink: #ff7b72;
      --text: #e6edf3;
      --text2: #8b949e;
      --text3: #6e7681;
      --mono: 'Fira Code', 'Cascadia Code', Consolas, monospace;
      --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 15px;
    }

    .app {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* SIDEBAR */
    .sidebar {
      width: 280px;
      min-width: 260px;
      background: var(--bg2);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex-shrink: 0;
    }

    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--bg);
    }

    .sidebar-header h1 {
      font-size: 13px;
      font-weight: 700;
      color: var(--green);
      letter-spacing: .5px;
      text-transform: uppercase;
    }

    .sidebar-header p {
      font-size: 11px;
      color: var(--text2);
      margin-top: 2px;
    }

    .progress-bar-wrap {
      margin-top: 10px;
      background: var(--bg3);
      border-radius: 4px;
      height: 5px;
    }

    .progress-bar {
      height: 5px;
      background: linear-gradient(90deg, var(--green2), var(--green));
      border-radius: 4px;
      transition: width .4s;
    }

    .progress-label {
      font-size: 10px;
      color: var(--text3);
      margin-top: 4px;
    }

    .mod-list {
      overflow-y: auto;
      flex: 1;
      padding: 8px 0;
    }

    .mod-item {
      cursor: pointer;
    }

    .mod-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 14px;
      font-size: 12px;
      font-weight: 600;
      color: var(--text2);
      letter-spacing: .3px;
      cursor: pointer;
      user-select: none;
      transition: background .15s;
      border-left: 3px solid transparent;
    }

    .mod-header:hover {
      background: var(--bg3);
      color: var(--text);
    }

    .mod-header.active {
      color: var(--green);
      border-left-color: var(--green);
      background: rgba(63, 185, 80, .08);
    }

    .mod-icon {
      font-size: 14px;
      width: 20px;
      text-align: center;
      flex-shrink: 0;
    }

    .mod-title {
      flex: 1;
    }

    .mod-arrow {
      font-size: 10px;
      color: var(--text3);
      transition: transform .2s;
    }

    .mod-item.open .mod-arrow {
      transform: rotate(90deg);
    }

    .mod-badge {
      background: var(--green3);
      color: var(--green);
      font-size: 9px;
      padding: 1px 5px;
      border-radius: 3px;
    }

    .lesson-list {
      display: none;
      padding: 2px 0 6px;
    }

    .mod-item.open .lesson-list {
      display: block;
    }

    .lesson-btn {
      display: flex;
      align-items: center;
      gap: 7px;
      padding: 6px 14px 6px 42px;
      font-size: 12px;
      color: var(--text2);
      cursor: pointer;
      transition: color .15s, background .15s;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }

    .lesson-btn:hover {
      color: var(--text);
      background: var(--bg3);
    }

    .lesson-btn.active {
      color: var(--cyan);
      font-weight: 600;
    }

    .lesson-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--border2);
      flex-shrink: 0;
      transition: background .2s;
    }

    .lesson-btn.active .lesson-dot {
      background: var(--cyan);
    }

    .lesson-btn.done .lesson-dot {
      background: var(--green);
    }

    .lesson-btn.done {
      color: var(--text3);
      text-decoration: line-through;
    }

    /* MAIN */
    .main {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .top-bar {
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 10px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
      flex-shrink: 0;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .breadcrumb {
      font-size: 12px;
      color: var(--text3);
    }

    .breadcrumb span {
      color: var(--text2);
    }

    .lesson-nav {
      margin-left: auto;
      display: flex;
      gap: 8px;
    }

    .nav-btn {
      background: var(--bg2);
      border: 1px solid var(--border);
      color: var(--text2);
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      transition: all .15s;
    }

    .nav-btn:hover {
      border-color: var(--border2);
      color: var(--text);
    }

    .nav-btn.primary {
      background: var(--green3);
      border-color: var(--green2);
      color: var(--green);
    }

    .nav-btn.primary:hover {
      background: rgba(38, 166, 65, .25);
    }

    .content {
      padding: 32px 40px;
      max-width: 900px;
      width: 100%;
    }

    .lesson-title {
      font-size: 26px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 6px;
    }

    .lesson-meta {
      display: flex;
      gap: 10px;
      margin-bottom: 24px;
      align-items: center;
    }

    .tag {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 4px;
      font-weight: 600;
    }

    .tag-green {
      background: var(--green3);
      color: var(--green);
    }

    .tag-blue {
      background: rgba(88, 166, 255, .12);
      color: var(--cyan);
    }

    .tag-orange {
      background: rgba(240, 136, 62, .12);
      color: var(--orange);
    }

    .tag-purple {
      background: rgba(210, 168, 255, .1);
      color: var(--purple);
    }

    .tag-red {
      background: rgba(248, 81, 73, .1);
      color: var(--red);
    }

    .section {
      margin-bottom: 28px;
    }

    .section-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: .6px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .prose {
      line-height: 1.75;
      color: var(--text);
      font-size: 15px;
    }

    .prose p {
      margin-bottom: 12px;
    }

    .prose strong {
      color: var(--yellow);
      font-weight: 600;
    }

    .prose em {
      color: var(--purple);
      font-style: italic;
    }

    .prose a {
      color: var(--cyan);
    }

    .prose ul,
    .prose ol {
      padding-left: 22px;
      margin-bottom: 12px;
    }

    .prose li {
      margin-bottom: 5px;
    }

    .prose code {
      font-family: var(--mono);
      background: var(--bg3);
      color: var(--orange);
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 13px;
    }

    /* TERMINAL */
    .terminal {
      background: #010409;
      border: 1px solid var(--border);
      border-radius: 8px;
      margin: 16px 0;
      overflow: hidden;
      font-family: var(--mono);
    }

    .terminal-header {
      background: var(--bg2);
      padding: 8px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid var(--border);
    }

    .dot {
      width: 11px;
      height: 11px;
      border-radius: 50%;
    }

    .dot-r {
      background: #ff5f57;
    }

    .dot-y {
      background: #febc2e;
    }

    .dot-g {
      background: #28c840;
    }

    .term-title {
      font-size: 11px;
      color: var(--text3);
      margin-left: auto;
    }

    .terminal-body {
      padding: 14px 16px;
      font-size: 13px;
      line-height: 1.65;
      overflow-x: auto;
    }

    .cmd {
      color: var(--green);
    }

    .cmd::before {
      content: '$ ';
      color: var(--text3);
    }

    .output {
      color: var(--text2);
    }

    .comment {
      color: var(--text3);
    }

    .comment::before {
      content: '# ';
    }

    .root-cmd {
      color: var(--yellow);
    }

    .root-cmd::before {
      content: '# ';
      color: var(--red);
    }

    .t-gap {
      display: block;
      height: 6px;
    }

    .t-hl {
      color: var(--cyan);
    }

    /* CALLOUT */
    .callout {
      border-left: 3px solid;
      border-radius: 0 6px 6px 0;
      padding: 12px 16px;
      margin: 16px 0;
    }

    .callout.tip {
      border-color: var(--green);
      background: rgba(63, 185, 80, .07);
    }

    .callout.warn {
      border-color: var(--yellow);
      background: rgba(227, 179, 65, .07);
    }

    .callout.danger {
      border-color: var(--red);
      background: rgba(248, 81, 73, .07);
    }

    .callout.info {
      border-color: var(--cyan);
      background: rgba(88, 166, 255, .07);
    }

    .callout-title {
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 6px;
    }

    .callout.tip .callout-title {
      color: var(--green);
    }

    .callout.warn .callout-title {
      color: var(--yellow);
    }

    .callout.danger .callout-title {
      color: var(--red);
    }

    .callout.info .callout-title {
      color: var(--cyan);
    }

    .callout .prose {
      font-size: 13.5px;
    }

    /* COMMAND TABLE */
    .cmd-table {
      width: 100%;
      border-collapse: collapse;
      margin: 14px 0;
      font-size: 13px;
    }

    .cmd-table th {
      text-align: left;
      padding: 8px 12px;
      background: var(--bg3);
      color: var(--text2);
      font-weight: 600;
      border-bottom: 1px solid var(--border);
    }

    .cmd-table td {
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }

    .cmd-table td:first-child {
      font-family: var(--mono);
      color: var(--orange);
      white-space: nowrap;
    }

    .cmd-table td:last-child {
      color: var(--text2);
    }

    .cmd-table tr:hover td {
      background: var(--bg3);
    }

    /* EXERCISE BOX */
    .exercise {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 18px 20px;
      margin: 20px 0;
    }

    .ex-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--yellow);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .ex-list {
      list-style: none;
      padding: 0;
    }

    .ex-list li {
      padding: 5px 0;
      font-size: 13.5px;
      color: var(--text);
      display: flex;
      gap: 8px;
    }

    .ex-list li::before {
      content: '→';
      color: var(--green);
      font-weight: 700;
      flex-shrink: 0;
    }

    /* WELCOME */
    .welcome {
      padding: 48px 40px;
      max-width: 780px;
    }

    .welcome h1 {
      font-size: 36px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    .welcome h1 span {
      color: var(--green);
    }

    .welcome p {
      color: var(--text2);
      font-size: 16px;
      line-height: 1.7;
      margin-bottom: 20px;
    }

    .mod-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
      margin-top: 24px;
    }

    .mod-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      cursor: pointer;
      transition: border-color .15s, transform .15s;
    }

    .mod-card:hover {
      border-color: var(--border2);
      transform: translateY(-1px);
    }

    .mod-card .icon {
      font-size: 22px;
      margin-bottom: 6px;
    }

    .mod-card h3 {
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 3px;
    }

    .mod-card p {
      font-size: 11px;
      color: var(--text3);
    }

    /* RESOURCES */
    .resource-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .resource-card {
      background: var(--bg3);
      border-radius: 6px;
      padding: 12px 14px;
      border: 1px solid var(--border);
    }

    .resource-card h4 {
      font-size: 12px;
      font-weight: 700;
      color: var(--cyan);
      margin-bottom: 5px;
    }

    .resource-card p {
      font-size: 11.5px;
      color: var(--text2);
    }

    /* SCROLLBAR */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border2);
      border-radius: 3px;
    }

    @media (max-width: 700px) {
      .sidebar {
        width: 220px;
        min-width: 200px;
      }

      .content {
        padding: 20px 18px;
      }

      .welcome {
        padding: 28px 20px;
      }
    }

    /* AUTH MODAL & PROFILE */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.8);
      z-index: 100;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(4px);
    }

    .modal {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    }

    .modal h2 {
      margin-bottom: 20px;
      color: var(--text);
      font-weight: 800;
      font-size: 20px;
    }

    .input-group {
      margin-bottom: 16px;
    }

    .input-group label {
      display: block;
      font-size: 12px;
      color: var(--text2);
      margin-bottom: 6px;
      font-weight: 600;
    }

    .input-group input {
      width: 100%;
      padding: 10px;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      outline: none;
      font-family: var(--sans);
    }

    .input-group input:focus {
      border-color: var(--cyan);
    }

    .btn-block {
      width: 100%;
      padding: 12px;
      background: var(--green3);
      color: var(--green);
      border: 1px solid var(--green2);
      border-radius: 6px;
      cursor: pointer;
      font-weight: 700;
      margin-top: 10px;
      transition: .15s;
    }

    .btn-block:hover {
      background: rgba(38, 166, 65, .25);
    }

    .btn-link {
      background: none;
      border: none;
      color: var(--cyan);
      font-size: 12px;
      cursor: pointer;
      margin-top: 16px;
      width: 100%;
      text-align: center;
    }

    .btn-link:hover {
      text-decoration: underline;
    }

    .user-profile {
      margin-top: 12px;
      padding: 12px;
      background: var(--bg3);
      border-radius: 6px;
      border: 1px solid var(--border);
      display: none;
    }

    .user-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .user-name {
      font-weight: 700;
      color: var(--text);
      font-size: 13px;
    }

    .user-level {
      font-size: 10px;
      background: var(--purple);
      color: #fff;
      padding: 3px 6px;
      border-radius: 10px;
      font-weight: 800;
    }

    .btn-logout {
      background: none;
      border: none;
      color: var(--red);
      font-size: 11px;
      cursor: pointer;
      margin-top: 10px;
      text-decoration: underline;
      font-weight: 600;
    }

    .login-prompt-btn {
      width: 100%;
      padding: 8px;
      background: var(--bg3);
      border: 1px dashed var(--border2);
      color: var(--text);
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      margin-top: 12px;
      transition: .2s;
      font-weight: 600;
    }

    .login-prompt-btn:hover {
      background: var(--border);
      border-style: solid;
    }
  </style>
</head>

<body>
  <div class="app">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1>🐧 Linux Completo</h1>
        <p>Programación &amp; Ciberseguridad</p>

        <!-- AUTH AREA -->
        <button id="login-prompt" class="login-prompt-btn" onclick="openModal('login')">🔑 Iniciar Sesión para guardar
          progreso</button>
        <div id="user-profile" class="user-profile">
          <div class="user-info">
            <span class="user-name" id="profile-name">Usuario</span>
            <span class="user-level" id="profile-level">Lvl 1</span>
          </div>
          <div class="progress-bar-wrap">
            <div class="progress-bar" id="xp-bar" style="width:0%"></div>
          </div>
          <div class="progress-label" id="xp-label">0 / 50 XP</div>

          <div class="progress-bar-wrap" style="margin-top:12px;">
            <div class="progress-bar" id="prog-bar"
              style="width:0%; background: linear-gradient(90deg, var(--cyan), var(--blue));"></div>
          </div>
          <div class="progress-label" id="prog-label">0 / 0 lecciones</div>
          <button class="btn-logout" onclick="logout()">Cerrar sesión</button>
        </div>
        <!-- END AUTH AREA -->
      </div>
      <div class="mod-list" id="mod-list"></div>
    </aside>
    <main class="main">
      <div class="top-bar" id="top-bar" style="display:none">
        <div class="breadcrumb" id="breadcrumb"></div>
        <div class="lesson-nav">
          <button class="nav-btn" id="btn-prev" onclick="navLesson(-1)">← Anterior</button>
          <button class="nav-btn" id="btn-done" onclick="markDone()">Marcar como visto ✓</button>
          <button class="nav-btn primary" id="btn-next" onclick="navLesson(1)">Siguiente →</button>
        </div>
      </div>
      <div id="content-area"></div>
    </main>
  </div>

  <!-- AUTH MODAL -->
  <div class="modal-overlay" id="auth-modal">
    <div class="modal">
      <h2 id="modal-title">Iniciar Sesión</h2>
      <form id="auth-form" onsubmit="handleAuth(event)">
        <div class="input-group" id="group-username" style="display:none;">
          <label>Nombre de Hacker</label>
          <input type="text" id="auth-username" placeholder="p. ej. Neo">
        </div>
        <div class="input-group">
          <label>Email</label>
          <input type="email" id="auth-email" required placeholder="tu@email.com">
        </div>
        <div class="input-group">
          <label>Contraseña</label>
          <input type="password" id="auth-password" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn-block" id="modal-submit">Entrar</button>
      </form>
      <button class="btn-link" id="modal-toggle" onclick="toggleAuthMode()">¿No tienes cuenta? Registrate aquí</button>
    </div>
  </div>

  <script>
    // ─── API CONTEXT ───────────────────────────────────────────────────────────────
    const API_URL = 'http://localhost:3000/api';
    let authMode = 'login'; // 'login' or 'register'
    let authToken = localStorage.getItem('linux_token');
    let currentUser = null;

    // ─── COURSE DATA ───────────────────────────────────────────────────────────────
    const MODULES = [
      {
        id: 1, icon: "🐧", title: "Fundamentos de Linux",
        lessons: [
          {
            id: "1.1", title: "¿Qué es Linux y por qué usarlo?", time: "10 min", level: "Básico",
            tag: "tag-green",
            content: `
<div class="section">
<div class="section-title">Introducción</div>
<div class="prose">
<p><strong>Linux</strong> es un sistema operativo de código abierto basado en el núcleo (<em>kernel</em>) creado por <strong>Linus Torvalds</strong> en 1991. No es solo un sistema operativo: es la base de la internet, los servidores, los dispositivos Android, los supercomputadores y el mundo del hacking ético.</p>
<p>A diferencia de Windows o macOS, Linux te da <strong>control total</strong> sobre tu sistema. Puedes ver y modificar cada archivo, proceso y configuración.</p>
</div>
</div>
<div class="section">
<div class="section-title">¿Por qué Linux para programación y ciberseguridad?</div>
<div class="prose">
<ul>
<li><strong>Programación:</strong> La mayoría de servidores web corren Linux. Docker, Kubernetes, Node.js, Python — todo funciona mejor en Linux. Los mejores IDEs y herramientas son nativos de Linux.</li>

<div class="section"><div class="section-title">Filesystem Hierarchy Standard (FHS)</div>
<div class="prose"><p>En Linux, <strong>todo es un archivo</strong> — dispositivos, procesos, red. La estructura de directorios es estándar y crucial entenderla.</p></div>
<table class="cmd-table">
<tr><th>Directorio</th><th>Contenido</th><th>Importancia</th></tr>
<tr><td>/</td><td>Raíz del sistema</td><td>Todo empieza aquí</td></tr>
<tr><td>/home</td><td>Directorio de usuarios</td><td>Tus archivos personales</td></tr>
<tr><td>/root</td><td>Home del superusuario</td><td>Solo root puede acceder</td></tr>
<tr><td>/etc</td><td>Configuración del sistema</td><td>¡Muy importante en pentesting!</td></tr>
<tr><td>/var</td><td>Datos variables (logs, bases de datos)</td><td>/var/log tiene los registros</td></tr>
<tr><td>/tmp</td><td>Archivos temporales</td><td>Se borra al reiniciar</td></tr>
<tr><td>/bin, /usr/bin</td><td>Ejecutables del sistema</td><td>ls, grep, cat están aquí</td></tr>
<tr><td>/sbin, /usr/sbin</td><td>Ejecutables de administración</td><td>ifconfig, iptables, fdisk</td></tr>
<tr><td>/lib, /usr/lib</td><td>Bibliotecas compartidas</td><td>Como .dll en Windows</td></tr>
<tr><td>/proc</td><td>Info de procesos en tiempo real</td><td>Sistema de archivos virtual</td></tr>
<tr><td>/sys</td><td>Info del hardware/kernel</td><td>Sistema de archivos virtual</td></tr>
<tr><td>/dev</td><td>Dispositivos (disco, USB, red)</td><td>/dev/sda = primer disco</td></tr>
<tr><td>/opt</td><td>Software de terceros</td><td>Kali tools, etc.</td></tr>
<tr><td>/mnt, /media</td><td>Puntos de montaje</td><td>USB, particiones</td></tr>
</table>
</div>
<div class="section"><div class="section-title">Archivos críticos para conocer</div>
<div class="terminal"><div class="terminal-header"><div class="dot dot-r"></div><div class="dot dot-y"></div><div class="dot dot-g"></div><div class="term-title">Terminal</div></div>

<div class="comment">Usuarios del sistema</div>

<div class="section"><div class="section-title">El sistema de permisos rwx</div>
<div class="prose"><p>Cada archivo tiene permisos para tres entidades: <strong>propietario (u)</strong>, <strong>grupo (g)</strong> y <strong>otros (o)</strong>.</p></div>
<div class="terminal"><div class="terminal-header"><div class="dot dot-r"></div><div class="dot dot-y"></div><div class="dot dot-g"></div><div class="term-title">Leyendo permisos</div></div>
<div class="terminal-body">
<div class="cmd">ls -la archivo.sh</div>
<div class="output"><span style="color:var(--green)">-rwxr-xr--</span> 1 juan developers 1024 ene 15 10:30 archivo.sh</div>
<span class="t-gap"></span>
<div class="output"><span style="color:var(--text3)">│   │  │  │</span>
<span style="color:var(--text3)">│   │  │  └─── otros (r-- = solo lectura)</span>
<span style="color:var(--text3)">│   │  └────── grupo (r-x = lectura y ejecución)</span>
<span style="color:var(--text3)">│   └───────── propietario (rwx = todo)</span>
<span style="color:var(--text3)">└───────────── tipo (- archivo, d directorio, l enlace)</span></div>
<span class="t-gap"></span>
<div class="comment">r=4, w=2, x=1  →  rwx=7, rw-=6, r-x=5, r--=4</div>
</div></div>
</div>
<div class="section"><div class="section-title">chmod — cambiar permisos</div>
<div class="terminal"><div class="terminal-header"><div class="dot dot-r"></div><div class="dot dot-y"></div><div class="dot dot-g"></div><div class="term-title">chmod</div></div>
<div class="terminal-body">
<div class="comment">Modo octal (más común)</div>
<div class="cmd">chmod 755 script.sh</div><div class="output">   # rwxr-xr-x</div>
<div class="cmd">chmod 644 archivo.txt</div><div class="output">  # rw-r--r--</div>
<div class="cmd">chmod 600 clave.pem</div><div class="output">   # rw------- (solo propietario)</div>
<div class="cmd">chmod 777 publico/</div><div class="output">    # rwxrwxrwx (¡peligroso!)</div>
<span class="t-gap"></span>
<div class="comment">Modo simbólico</div>
<div class="cmd">chmod +x script.sh</div><div class="output">       # Añadir ejecución a todos</div>
<div class="cmd">chmod u+x,g-w script.sh</div><div class="output">   # Propietario +x, grupo -w</div>
<div class="cmd">chmod o-r secreto.txt</div><div class="output">     # Quitar lectura a otros</div>
<div class="cmd">chmod -R 755 directorio/</div><div class="output">   # Recursivo</div>
</div></div>
</div>
<div class="section"><div class="section-title">chown — cambiar propietario</div>
<div class="terminal"><div class="terminal-header"><div class="dot dot-r"></div><div class="dot dot-y"></div><div class="dot dot-g"></div><div class="term-title">chown</div></div>
<div class="terminal-body">
<div class="root-cmd">chown juan archivo.txt</div>
<div class="root-cmd">chown juan:developers proyecto/</div>
<div class="root-cmd">chown -R www-data:www-data /var/www/html/</div>
</div></div>
</div>
<div class="section"><div class="section-title">SUID, SGID y Sticky bit — permisos especiales</div>
<div class="prose"><p>Estos son <strong>críticos en ciberseguridad</strong>: los binarios SUID corren con los privilegios del propietario (generalmente root), lo que puede ser una vulnerabilidad.</p></div>
<div class="terminal"><div class="terminal-header"><div class="dot dot-r"></div><div class="dot dot-y"></div><div class="dot dot-g"></div><div class="term-title">Permisos Especiales</div></div>
<div class="terminal-body">
<div class="comment">SUID (corre como el dueño del archivo)</div>
<div class="cmd">ls -la /usr/bin/passwd</div>
<div class="output">-rwsr-xr-x 1 root root 59976 /usr/bin/passwd</div><div class="output">     # 's' indica SUID</div>
<span class="t-gap"></span>
<div class="comment">Buscar todos los SUID (pentesting)</div>
<div class="cmd">find / -perm -4000 -type f 2>/dev/null</div>
<span class="t-gap"></span>
<div class="comment">Sticky bit (solo el dueño puede borrar)</div>
<div class="cmd">ls -la /tmp</div>
<div class="output">drwxrwxrwt  1 root root /tmp</div><div class="output">     # 't' = sticky bit</div>
</div></div>
</div>
<div class="callout warn"><div class="callout-title">⚠️ Escalada de privilegios</div>
<div class="prose">Los binarios con SUID incorrecto son una de las formas más comunes de escalada de privilegios en CTFs y pentests reales. Siempre busca SUIDs en tus ejercicios de hacking ético.</div></div>`

<div class="section"><div class="section-title">Script de reconocimiento básico</div>
<div class="prose"><p>Vamos a crear un script real que combina todo lo aprendido: un <strong>escáner de información básico</strong> para un dominio.</p></div>
<div class="terminal"><div class="terminal-header"><div class="dot dot-r"></div><div class="dot dot-y"></div><div class="dot dot-g"></div><div class="term-title">recon.sh</div></div>
<div class="terminal-body">
<div class="output">#!/bin/bash</div>
<div class="output"># Script de reconocimiento básico</div>
<div class="output"># Uso: ./recon.sh &lt;dominio&gt;</div>
<div class="output"></div>
<div class="output">RED='\\033[0;31m'; GREEN='\\033[0;32m'</div>
<div class="output">YELLOW='\\033[1;33m'; CYAN='\\033[0;36m'</div>
<div class="output">NC='\\033[0m' # Sin color</div>
<span class="t-gap"></span>
<div class="output">if [ \$# -eq 0 ]; then</div>
<div class="output">    echo -e "\${RED}[!] Uso: \$0 &lt;dominio&gt;\${NC}"</div>
<div class="output">    exit 1</div>
<div class="output">fi</div>
<span class="t-gap"></span>
<div class="output">DOMINIO=\$1</div>
<div class="output">FECHA=$(date +%Y%m%d_%H%M%S)</div>
<div class="output">REPORTE="recon_\${DOMINIO}_\${FECHA}.txt"</div>
<span class="t-gap"></span>
<div class="output">log() { echo -e "\$1" | tee -a "$REPORTE"; }</div>
<span class="t-gap"></span>
<div class="output">log "\${CYAN}[*] Iniciando reconocimiento de: $DOMINIO\${NC}"</div>
<div class="output">log "\${CYAN}[*] Fecha: $(date)\${NC}"</div>
<div class="output">log "----------------------------------------"</div>
<span class="t-gap"></span>
<div class="output">log "\n\${YELLOW}[+] INFORMACIÓN DNS\${NC}"</div>
<div class="output">IP=$(dig +short $DOMINIO | tail -n1)</div>
<div class="output">log "IP principal: $IP"</div>
<div class="output">log "Registros DNS:"</div>
<div class="output">dig $DOMINIO ANY +short 2>/dev/null | tee -a "$REPORTE"</div>
<span class="t-gap"></span>
<div class="output">log "\n\${YELLOW}[+] WHOIS\${NC}"</div>
<div class="output">whois $DOMINIO 2>/dev/null | grep -E "Registrar:|Created:|Expires:" | tee -a "$REPORTE"</div>
<span class="t-gap"></span>
<div class="output">log "\n\${YELLOW}[+] PING\${NC}"</div>
<div class="output">if ping -c 2 $DOMINIO &>/dev/null; then</div>
<div class="output">    log "\${GREEN}[+] Host activo\${NC}"</div>
<div class="output">else</div>
<div class="output">    log "\${RED}[-] Host no responde al ping\${NC}"</div>
<div class="output">fi</div>
<span class="t-gap"></span>
<div class="output">log "\n\${YELLOW}[+] CABECERAS HTTP\${NC}"</div>
<div class="output">curl -sI "https://$DOMINIO" 2>/dev/null | head -20 | tee -a "$REPORTE"</div>
<span class="t-gap"></span>
<div class="output">log "\n\${GREEN}[✓] Reporte guardado en: $REPORTE\${NC}"</div>
</div></div>
</div>
<div class="exercise"><div class="ex-title">🎯 Ejercicio</div>
<ul class="ex-list">
<li>Copia el script, dale permisos con <code>chmod +x recon.sh</code></li>
<li>Ejecútalo contra un dominio público: <code>./recon.sh google.com</code></li>
<li>Añade una sección que muestre los puertos abiertos usando <code>nc -zv</code></li>
<li>Añade colores personalizados y más información DNS</li>
</ul></div>`

<div class="prose"><p>La base de la ciberseguridad son tres principios fundamentales:</p></div>
<table class="cmd-table">
<tr><th>Principio</th><th>Definición</th><th>Ejemplo de ataque que lo viola</th></tr>
<tr><td>🔐 Confidencialidad</td><td>Solo personas autorizadas acceden a la información</td><td>Robo de datos, sniffing, fugas</td></tr>
<tr><td>✅ Integridad</td><td>La información no es alterada sin autorización</td><td>SQL injection, MitM, tampering</td></tr>
<tr><td>🌐 Disponibilidad</td><td>Los sistemas están accesibles cuando se necesitan</td><td>DDoS, ransomware</td></tr>

<div class="section"><div class="section-title">Tipos de hackers</div>
<table class="cmd-table">
<tr><th>Tipo</th><th>Descripción</th><th>Legalidad</th></tr>
<tr><td style="color:var(--green)">⬜ White Hat</td><td>Hackers éticos — trabajan con autorización para mejorar la seguridad</td><td style="color:var(--green)">Legal</td></tr>
<tr><td style="color:var(--text3)">⬛ Black Hat</td><td>Criminales — explotan sistemas sin autorización</td><td style="color:var(--red)">Ilegal</td></tr>
<tr><td style="color:var(--text2)">🔲 Grey Hat</td><td>Explotan sistemas sin permiso pero sin intención maliciosa</td><td style="color:var(--yellow)">Gris</td></tr>

    // ─── STATE ───────────────────────────────────────────────────────────────────
    let currentLesson = null;
    let done = new Set();
    let flatLessons = [];
    MODULES.forEach(m => m.lessons.forEach(l => flatLessons.push({ mod: m, lesson: l })));

    // ─── RENDER SIDEBAR ──────────────────────────────────────────────────────────
    function renderSidebar() {
      const list = document.getElementById('mod-list');
      list.innerHTML = '';
      MODULES.forEach(m => {
        const item = document.createElement('div');
        item.className = 'mod-item';
        item.id = 'mod-' + m.id;
        const doneLessons = m.lessons.filter(l => done.has(l.id)).length;
        item.innerHTML = `
      <div class="mod-header" onclick="toggleMod(${m.id})">
        <span class="mod-icon">${m.icon}</span>
        <span class="mod-title">${m.title}</span>
        ${doneLessons > 0 ? `<span class="mod-badge">${doneLessons}/${m.lessons.length}</span>` : ''}
        <span class="mod-arrow">▶</span>
      </div>
      <div class="lesson-list">${m.lessons.map(l => `
        <button class="lesson-btn ${done.has(l.id) ? 'done' : ''} ${currentLesson && currentLesson.id === l.id ? 'active' : ''}" onclick="loadLesson('${l.id}')">
          <span class="lesson-dot"></span>${l.title}
        </button>`).join('')}
      </div>`;
        list.appendChild(item);
        if (currentLesson && m.lessons.find(l => l.id === currentLesson.id)) {
          item.classList.add('open');
          item.querySelector('.mod-header').classList.add('active');
        }
      });
      updateProgress();
    }

    function toggleMod(id) {
      const item = document.getElementById('mod-' + id);
      item.classList.toggle('open');
    }

    function updateProgress() {
      const total = flatLessons.length;
      const n = done.size;
      const pct = total ? Math.round(n / total * 100) : 0;
      document.getElementById('prog-bar').style.width = pct + '%';
      document.getElementById('prog-label').textContent = `${n} / ${total} lecciones completadas`;
    }

    // ─── LOAD LESSON ─────────────────────────────────────────────────────────────
    function loadLesson(id) {
      const found = flatLessons.find(x => x.lesson.id === id);
      if (!found) return;
      currentLesson = found.lesson;
      const mod = found.mod;

      document.getElementById('top-bar').style.display = 'flex';
      document.getElementById('breadcrumb').innerHTML =
        `<span>${mod.icon} ${mod.title}</span> <span style="color:var(--border2)">/</span> <span>${currentLesson.title}</span>`;

      const doneBtn = document.getElementById('btn-done');
      doneBtn.textContent = done.has(id) ? '✓ Completado' : 'Marcar como visto ✓';
      doneBtn.style.background = done.has(id) ? 'var(--green3)' : '';
      doneBtn.style.borderColor = done.has(id) ? 'var(--green2)' : '';
      doneBtn.style.color = done.has(id) ? 'var(--green)' : '';

      const tagMap = { 'tag-green': ['Básico', 'tag-green'], 'tag-blue': ['Intermedio', 'tag-blue'], 'tag-orange': ['Avanzado', 'tag-orange'], 'tag-red': ['Experto', 'tag-red'] };
      const [levelLabel] = tagMap[currentLesson.tag] || ['Básico', 'tag-green'];

      document.getElementById('content-area').innerHTML = `
    <div class="content">
      <h1 class="lesson-title">${currentLesson.title}</h1>
      <div class="lesson-meta">
        <span class="tag ${currentLesson.tag}">${levelLabel}</span>
        <span class="tag tag-blue">⏱ ${currentLesson.time}</span>
        <span class="tag tag-purple">📖 ${mod.title}</span>
      </div>
      ${currentLesson.content}
    </div>`;

      document.querySelector('.main').scrollTo(0, 0);
      renderSidebar();
    }

    async function markDone() {
      if (!currentLesson) return;
      const id = currentLesson.id;
      const isDone = done.has(id);
      if (isDone) done.delete(id);
      else done.add(id);
      const doneBtn = document.getElementById('btn-done');
      doneBtn.textContent = done.has(id) ? '✓ Completado' : 'Marcar como visto ✓';
      doneBtn.style.background = done.has(id) ? 'var(--green3)' : '';
      doneBtn.style.borderColor = done.has(id) ? 'var(--green2)' : '';
      doneBtn.style.color = done.has(id) ? 'var(--green)' : '';
      renderSidebar();

      if (authToken) {
        try {
          await fetch(`${API_URL}/progress`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${authToken}` },
            body: JSON.stringify({ lessonId: id, done: !isDone })
          });
          await fetchProfile();
        } catch (err) { console.error('Error saving progress', err); }
      }
    }

    function navLesson(dir) {
      if (!currentLesson) return;
      const idx = flatLessons.findIndex(x => x.lesson.id === currentLesson.id);
      const next = flatLessons[idx + dir];
      if (next) loadLesson(next.lesson.id);
    }

    // ─── WELCOME SCREEN ───────────────────────────────────────────────────────────
    function showWelcome() {
      document.getElementById('top-bar').style.display = 'none';
      document.getElementById('content-area').innerHTML = `
    <div class="welcome">
      <h1>Bienvenido al<br><span>Curso Linux Completo</span></h1>
      <p>Un curso en español desde cero hasta ciberseguridad avanzada. Aprende los fundamentos, bash scripting, programación en Python/C y hacking ético con Kali Linux.</p>
      <p style="color:var(--text3);font-size:13px;">📍 ${flatLessons.length} lecciones · 10 módulos · Del escritorio al pentesting</p>
      <div class="mod-grid">
        ${MODULES.map(m => `
          <div class="mod-card" onclick="loadLesson('${m.lessons[0].id}')">
            <div class="icon">${m.icon}</div>
            <h3>${m.title}</h3>
            <p>${m.lessons.length} lección${m.lessons.length !== 1 ? 'es' : ''}</p>
          </div>`).join('')}
      </div>
    </div>`;
    }

    // ─── AUTH LOGIC ──────────────────────────────────────────────────────────────
    function openModal(mode) {
      authMode = mode;
      document.getElementById('auth-modal').style.display = 'flex';
      const isLogin = mode === 'login';
      document.getElementById('modal-title').textContent = isLogin ? 'Iniciar Sesión' : 'Registrarse';
      document.getElementById('modal-submit').textContent = isLogin ? 'Entrar' : 'Crear cuenta';
      document.getElementById('modal-toggle').textContent = isLogin ? '¿No tienes cuenta? Regístrate' : '¿Ya tienes cuenta? Inicia sesión';
      document.getElementById('group-username').style.display = isLogin ? 'none' : 'block';
      document.getElementById('auth-username').required = !isLogin;
    }

    function toggleAuthMode() {
      openModal(authMode === 'login' ? 'register' : 'login');
    }

    window.onclick = function (event) {
      const modal = document.getElementById('auth-modal');
      if (event.target == modal) {
        modal.style.display = "none";
      }
    }

    async function handleAuth(e) {
      e.preventDefault();
      const email = document.getElementById('auth-email').value;
      const password = document.getElementById('auth-password').value;
      const username = document.getElementById('auth-username').value;

      const endpoint = authMode === 'login' ? '/auth/login' : '/auth/register';
      const body = authMode === 'login' ? { email, password } : { username, email, password };

      try {
        const res = await fetch(`${API_URL}${endpoint}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body)
        });

        const data = await res.json();
        if (res.ok) {
          authToken = data.token;
          localStorage.setItem('linux_token', authToken);
          document.getElementById('auth-modal').style.display = 'none';
          await fetchProfile();
          await fetchProgress();
        } else {
          alert(data.message || 'Error en autenticación');
        }
      } catch (err) {
        alert('No se pudo conectar al servidor.');
        console.error(err);
      }
    }

    function logout() {
      localStorage.removeItem('linux_token');
      authToken = null;
      currentUser = null;
      done.clear();
      document.getElementById('login-prompt').style.display = 'block';
      document.getElementById('user-profile').style.display = 'none';
      renderSidebar();
    }

    async function fetchProfile() {
      if (!authToken) return;
      try {
        const res = await fetch(`${API_URL}/auth/profile`, {
          headers: { 'Authorization': `Bearer ${authToken}` }
        });
        if (res.ok) {
          currentUser = await res.json();
          document.getElementById('login-prompt').style.display = 'none';
          document.getElementById('user-profile').style.display = 'block';
          document.getElementById('profile-name').textContent = currentUser.username;
          document.getElementById('profile-level').textContent = `Lvl ${currentUser.level}`;

          const xpInLevel = currentUser.xp % 50;
          const xpPct = (xpInLevel / 50) * 100;
          document.getElementById('xp-bar').style.width = `${xpPct}%`;
          document.getElementById('xp-label').textContent = `${xpInLevel} / 50 XP (Nivel ${currentUser.level})`;
        } else {
          logout();
        }
      } catch (e) { console.error(e); }
    }

    async function fetchProgress() {
      if (!authToken) return;
      try {
        const res = await fetch(`${API_URL}/progress`, {
          headers: { 'Authorization': `Bearer ${authToken}` }
        });
        if (res.ok) {
          const data = await res.json();
          done.clear();
          data.completedLessons.forEach(id => done.add(id));
          renderSidebar();
        }
      } catch (e) { console.error(e); }
    }

    // ─── INIT ────────────────────────────────────────────────────────────────────
    async function initApp() {
      if (authToken) {
        await fetchProfile();
        await fetchProgress();
      } else {
        document.getElementById('login-prompt').style.display = 'block';
        document.getElementById('user-profile').style.display = 'none';
      }
      renderSidebar();
      showWelcome();
    }

    initApp();
  </script>
